version: '3.8'
name: cardiology
services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./qdrant_data:/qdrant/storage

#После того как сохранишь файл, открой терминал внизу окна PyCharm и введи команду:
#docker-compose up -d

# 6333 - вывод в браузере коллекций
# 6334 - загрузка тысячи векторов из книги